<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APS 智能排产演示系统</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚙</text></svg>">

    <!-- Font Awesome 6 (free) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <!-- ECharts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/echarts/5.5.0/echarts.min.js"></script>

    <!-- SortableJS -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>

    <link rel="stylesheet" href="css/style.css">
    <script>
        // 检测是否通过 file:// 打开，引导用户使用后端服务
        if (location.protocol === 'file:') {
            document.write('<div style="position:fixed;inset:0;z-index:99999;display:flex;align-items:center;justify-content:center;background:#F5F7FA;color:#303133;font-family:-apple-system,sans-serif;padding:40px;text-align:center">' +
                '<div><h1 style="color:#FF6B00;margin-bottom:12px;font-weight:600">需要启动后端服务</h1>' +
                '<p style="font-size:14px;color:#606266;margin-bottom:20px">请先启动 FastAPI 后端，然后访问<br>' +
                '<code style="background:#fff;border:1px solid #E4E7ED;padding:6px 16px;font-size:18px;color:#FF6B00;display:inline-block;margin:10px 0;border-radius:2px">http://localhost:8000</code></p>' +
                '<p style="font-size:12px;color:#909399">终端中运行: <code style="background:#fff;border:1px solid #E4E7ED;padding:3px 10px;border-radius:2px;font-size:12px">cd backend && python main.py</code></p>' +
                '</div></div>');
        }
    </script>
</head>
<body>

<div class="app-container">
    <!-- Sidebar Overlay (mobile) -->
    <div class="sidebar-overlay" id="sidebar-overlay"></div>

    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-logo">
            <div class="logo-icon">A</div>
            <span class="logo-text">APS 排产</span>
        </div>

        <nav class="sidebar-nav">
            <div class="nav-section">
                <div class="nav-section-title">概览</div>
                <div class="nav-item active" data-page="dashboard">
                    <i class="fas fa-chart-pie"></i>
                    <span class="nav-label">总览看板</span>
                </div>
            </div>

            <div class="nav-section">
                <div class="nav-section-title">基础管理</div>
                <div class="nav-item" data-page="employees">
                    <i class="fas fa-users"></i>
                    <span class="nav-label">人员管理</span>
                </div>
                <div class="nav-item" data-page="equipment">
                    <i class="fas fa-cogs"></i>
                    <span class="nav-label">设备管理</span>
                </div>
                <div class="nav-item" data-page="materials">
                    <i class="fas fa-boxes"></i>
                    <span class="nav-label">物料管理</span>
                </div>
                <div class="nav-item" data-page="methods">
                    <i class="fas fa-file-alt"></i>
                    <span class="nav-label">工法管理</span>
                </div>
            </div>

            <div class="nav-section">
                <div class="nav-section-title">生产管理</div>
                <div class="nav-item" data-page="orders">
                    <i class="fas fa-clipboard-list"></i>
                    <span class="nav-label">ERP订单管理</span>
                </div>
                <div class="nav-item" data-page="urgent">
                    <i class="fas fa-bolt"></i>
                    <span class="nav-label">加急订单</span>
                </div>
                <div class="nav-item" data-page="mes-lines">
                    <i class="fas fa-industry"></i>
                    <span class="nav-label">MES产线管理</span>
                </div>
                <div class="nav-item" data-page="schedule" style="background:#FFF4E6;color:#FF6B00">
                    <i class="fas fa-calendar-alt" style="color:#FF6B00"></i>
                    <span class="nav-label" style="font-weight:600">排产计划</span>
                </div>
            </div>

            <div class="nav-section">
                <div class="nav-section-title">安质监管理</div>
                <div class="nav-item" data-page="safety">
                    <i class="fas fa-shield-alt"></i>
                    <span class="nav-label">安全管理</span>
                </div>
                <div class="nav-item" data-page="quality">
                    <i class="fas fa-chart-line"></i>
                    <span class="nav-label">质量监控</span>
                </div>
                <div class="nav-item" data-page="anomaly">
                    <i class="fas fa-exclamation-triangle"></i>
                    <span class="nav-label">异常管理</span>
                </div>
            </div>

            <div class="nav-section">
                <div class="nav-section-title">数据可视化</div>
                <div class="nav-item" data-page="charts">
                    <i class="fas fa-chart-simple"></i>
                    <span class="nav-label">报表分析</span>
                </div>
            </div>

            <div class="nav-section">
                <div class="nav-section-title">系统管理</div>
                <div class="nav-item" data-page="sys-config">
                    <i class="fas fa-wrench"></i>
                    <span class="nav-label">系统配置</span>
                </div>
                <div class="nav-item" data-page="sys-users">
                    <i class="fas fa-user-cog"></i>
                    <span class="nav-label">用户管理</span>
                </div>
                <div class="nav-item" data-page="sys-security">
                    <i class="fas fa-lock"></i>
                    <span class="nav-label">安全管理</span>
                </div>
                <div class="nav-item" data-page="sys-compliance">
                    <i class="fas fa-gavel"></i>
                    <span class="nav-label">行为合规</span>
                </div>
                <div class="nav-item" data-page="sys-logs">
                    <i class="fas fa-history"></i>
                    <span class="nav-label">日志管理</span>
                </div>
            </div>
        </nav>

        <div class="sidebar-toggle" id="sidebar-toggle-btn">
            <i class="fas fa-chevron-left"></i>
        </div>
    </aside>

    <!-- Main Area -->
    <div class="main-area">
        <!-- Topbar -->
        <header class="topbar">
            <div class="topbar-left">
                <button class="topbar-btn" id="mobile-menu-btn" style="display:none">
                    <i class="fas fa-bars"></i>
                </button>
                <span class="topbar-page-title" id="page-title">总览看板</span>
            </div>
            <div class="topbar-right">
                <span class="topbar-time" id="topbar-time"></span>
                <button class="topbar-btn" id="notif-btn">
                    <i class="fas fa-bell"></i>
                    <span class="notification-dot"></span>
                </button>
                <div class="topbar-user">
                    <div class="user-avatar">K</div>
                    <span class="user-name">管理员</span>
                </div>
            </div>
        </header>

        <!-- Main Content -->
        <main class="main-content" id="page-content">
            <!-- Content rendered by JS -->
        </main>
    </div>
</div>

<!-- Toast Container -->
<div class="toast-container" id="toast-container"></div>

<script src="js/api.js"></script>
<script src="js/app.js"></script>

<!-- Responsive: show mobile menu button only on small screens -->
<script>
(function() {
    const checkMobile = () => {
        const btn = document.getElementById('mobile-menu-btn');
        if (btn) {
            btn.style.display = window.innerWidth <= 768 ? 'flex' : 'none';
        }
    };
    checkMobile();
    window.addEventListener('resize', checkMobile);
})();
</script>

</body>
</html>
